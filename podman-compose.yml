services:
  ramalama:
    build:
      context: ./ramalama 
      dockerfile: Containerfile
    ports:
      - "8080:8080"
    volumes:
      - ramalama_models:/root/.local/share/ramalama 
    environment:
      - RAMALAMA_STORE=/root/.local/share/ramalama

  backend:
    build:
      context: ./backend 
      dockerfile: Containerfile
    ports:
      - "8000:8000"
    depends_on:
      - ramalama

volumes:
  ramalama_models:
