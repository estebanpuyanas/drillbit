services:

  ramalama:
    build:
      context: ./ramalama 
      dockerfile: Containerfile
    ports:
      - "8080:8080"
    volumes:
      - ramalama_models:/root/.local/share/ramalama 
    environment:
      - RAMALAMA_STORE=/root/.local/share/ramalama

  backend:
    build:
      context: ./backend 
      dockerfile: Containerfile
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_data
    depends_on:
      - ramalama

  mcp-server:
    build:
      context: ./mcp-server 
      dockerfile: Containerfile
    ports:
      - "8001:8001"
    environment:
      - FASTMCP_HOST=0.0.0.0
      - FASTMCP_PORT=8001
    depends_on:
      - ramalama

volumes:
  ramalama_models:
  chroma_data:
